<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100vh;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }

    /* ローディング（任意だけどおすすめ） */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="loading">読み込み中...</div>

<iframe id="app"></iframe>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyly-vfPEmGZevctpnpPL-rdq-ogkvdvJawsQ_dTRsBP4lD1H9KQwnRxRd4GT3gFjqz/exec";

  const iframe = document.getElementById("app");
  iframe.src = GAS_URL + location.search;

  iframe.onload = function() {
    document.getElementById("loading").style.display = "none";
  };
</script>

</body>
</html>
