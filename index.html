<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    body {
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      overflow: auto;
    }

    #loading {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 18px;
      font-weight: bold;
    }

    @supports not (height: 100dvh) {
      #app,
      #loading {
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <div id="loading">読み込み中...</div>

  <iframe id="app"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyly-vfPEmGZevctpnpPL-rdq-ogkvdvJawsQ_dTRsBP4lD1H9KQwnRxRd4GT3gFjqz/exec";

    const iframe = document.getElementById("app");
    iframe.src = GAS_URL + location.search;

    iframe.onload = function () {
      document.getElementById("loading").style.display = "none";
    };
  </script>
</body>
</html>
